<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Learning Planner</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:#e2e8f0;
}

header{
    padding:20px;
    text-align:center;
    background:#111827;
    font-size:22px;
    font-weight:600;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    padding:10px 14px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.primary{ background:#22c55e; color:white; }
.secondary{ background:#3b82f6; color:white; }

.tabs{
    display:flex;
    justify-content:center;
    margin:15px 0;
}

.tab-btn{
    background:#334155;
    color:white;
}

.tab-btn.active{
    background:#22c55e;
}

.section{ display:none; }
.section.active{ display:block; }

.week{
    background:#0b1220;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.task{
    font-size:14px;
    margin-left:10px;
}

.progress-bar{
    height:10px;
    background:#334155;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    width:0%;
    background:#22c55e;
}
</style>
</head>

<body>

<header>📚 Learning Planner</header>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('topics')">Topics</button>
    <button class="tab-btn" onclick="showTab('plan')">Plan</button>
    <button class="tab-btn" onclick="showTab('progress')">Progress</button>
</div>

<div class="container">

<!-- TOPICS -->
<div id="topics" class="section active">

<div class="card">
    <h3>Add Topic</h3>
    <input id="title" placeholder="Topic name">
    <input id="weeks" type="number" placeholder="Weeks" value="4">
    <input id="hours" type="number" placeholder="Hours/week" value="5">
    <button class="primary" onclick="saveTopic()">Add</button>
</div>

<div id="topicList"></div>

</div>

<!-- PLAN -->
<div id="plan" class="section">
    <div class="card">
        <h3>Study Plan</h3>
        <div id="schedule"></div>
    </div>
</div>

<!-- PROGRESS -->
<div id="progress" class="section">
    <div class="card">
        <h3>Progress Tracker</h3>
        <div>Total Tasks: <span id="total">0</span></div>
        <div>Completed: <span id="done">0</span></div>
        <div class="progress-bar">
            <div class="fill" id="fill"></div>
        </div>
    </div>
</div>

</div>

<script>

let totalTasks = 0;
let completedTasks = 0;

function showTab(tab){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');

    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
}

async function loadTopics(){
    const res = await fetch('/api/topics');
    const data = await res.json();

    document.getElementById('topicList').innerHTML = data.map(t=>`
        <div class="card">
            <h3>${t.title}</h3>
            <p>${t.weeks} weeks • ${t.hours_per_week} hrs/week</p>
            <button class="primary" onclick="generate(${t.id})">Generate</button>
            <button class="secondary" onclick="view(${t.id})">View</button>
        </div>
    `).join('');
}

async function saveTopic(){
    const title = document.getElementById('title').value;

    await fetch('/api/topics',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            title,
            weeks:document.getElementById('weeks').value,
            hours_per_week:document.getElementById('hours').value
        })
    });

    loadTopics();
}

async function generate(id){
    await fetch('/api/schedule/generate/'+id,{method:'POST'});
    view(id);
}

async function view(id){
    const res = await fetch('/api/schedule/'+id);
    const data = await res.json();

    let html = "";
    totalTasks = 0;
    completedTasks = 0;

    data.forEach(w=>{
        html += `<div class="week"><b>Week ${w.week_number}</b>`;

        w.tasks.forEach(t=>{
            totalTasks++;
            html += `
            <div class="task">
                <input type="checkbox" onchange="update(this)">
                ${t.task_title}
            </div>`;
        });

        html += `</div>`;
    });

    document.getElementById('schedule').innerHTML = html;
    updateUI();
}

function update(box){
    if(box.checked) completedTasks++;
    else completedTasks--;
    updateUI();
}

function updateUI(){
    document.getElementById('total').innerText = totalTasks;
    document.getElementById('done').innerText = completedTasks;

    let percent = totalTasks ? (completedTasks/totalTasks)*100 : 0;
    document.getElementById('fill').style.width = percent + "%";
}

loadTopics();

</script>

</body>
</html>
